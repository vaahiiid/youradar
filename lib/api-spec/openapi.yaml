openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
security:
  - bearerAuth: []
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authenticated user info
  - name: sources
    description: Connected provider accounts
  - name: notifications
    description: Encrypted notification feed
  - name: privacy
    description: Privacy and encryption disclosures
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      security: []
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Return the authenticated user's id
      description: Requires a valid Clerk session.
      responses:
        "200":
          description: Authenticated user id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "401":
          description: Unauthenticated
  /privacy:
    get:
      operationId: getPrivacy
      tags: [privacy]
      summary: Privacy and encryption disclosures
      responses:
        "200":
          description: Privacy notice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivacyNotice"
  /sources:
    get:
      operationId: listSources
      tags: [sources]
      summary: List connected sources for the authenticated user
      responses:
        "200":
          description: Sources
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceListResponse"
        "401":
          description: Unauthenticated
    post:
      operationId: createSource
      tags: [sources]
      summary: Connect a new source. Sensitive fields are encrypted server-side.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSourceBody"
      responses:
        "201":
          description: Connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Source"
        "400":
          description: Invalid input
        "401":
          description: Unauthenticated
  /sources/{id}:
    patch:
      operationId: renameSource
      tags: [sources]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenameSourceBody"
      responses:
        "200":
          description: Renamed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Source"
        "404":
          description: Not found
    delete:
      operationId: disconnectSource
      tags: [sources]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Disconnected
        "404":
          description: Not found
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationListResponse"
    post:
      operationId: createNotification
      tags: [notifications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNotificationBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"
        "400":
          description: Invalid input
        "404":
          description: Source not found
  /notifications/{id}/seen:
    patch:
      operationId: markNotificationSeen
      tags: [notifications]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"
        "404":
          description: Not found
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    CurrentUser:
      type: object
      required: [userId]
      properties:
        userId:
          type: string
    PrivacyNotice:
      type: object
      required: [encryption, passwords, details]
      properties:
        encryption:
          type: string
        passwords:
          type: string
        details:
          type: object
          required:
            - algorithm
            - keyDerivation
            - encryptedFields
            - plaintextFields
            - adminAccess
          properties:
            algorithm:
              type: string
            keyDerivation:
              type: string
            encryptedFields:
              type: array
              items:
                type: string
            plaintextFields:
              type: array
              items:
                type: string
            adminAccess:
              type: string
    Source:
      type: object
      required:
        - id
        - provider
        - status
        - accountIdentifier
        - hasAccessToken
        - hasRefreshToken
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        provider:
          type: string
        status:
          type: string
        accountIdentifier:
          type: string
        displayLabel:
          type: ["string", "null"]
        hasAccessToken:
          type: boolean
        hasRefreshToken:
          type: boolean
        tokenExpiresAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    SourceListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Source"
    CreateSourceBody:
      type: object
      required: [provider, accountIdentifier]
      properties:
        provider:
          type: string
        accountIdentifier:
          type: string
        displayLabel:
          type: ["string", "null"]
        accessToken:
          type: ["string", "null"]
        refreshToken:
          type: ["string", "null"]
        tokenExpiresAt:
          type: ["string", "null"]
          format: date-time
    RenameSourceBody:
      type: object
      required: [displayLabel]
      properties:
        displayLabel:
          type: ["string", "null"]
    Notification:
      type: object
      required:
        - id
        - sourceId
        - provider
        - kind
        - occurredAt
        - isSeen
        - title
        - createdAt
      properties:
        id:
          type: string
        sourceId:
          type: string
        provider:
          type: string
        kind:
          type: string
        occurredAt:
          type: string
          format: date-time
        isSeen:
          type: boolean
        title:
          type: string
        snippet:
          type: ["string", "null"]
        senderName:
          type: ["string", "null"]
        senderIdentifier:
          type: ["string", "null"]
        externalRef:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
    NotificationListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Notification"
    CreateNotificationBody:
      type: object
      required: [sourceId, kind, title]
      properties:
        sourceId:
          type: string
        kind:
          type: string
        occurredAt:
          type: ["string", "null"]
          format: date-time
        title:
          type: string
        snippet:
          type: ["string", "null"]
        senderName:
          type: ["string", "null"]
        senderIdentifier:
          type: ["string", "null"]
        externalRef:
          type: ["string", "null"]
